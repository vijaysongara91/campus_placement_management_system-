<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interview Scheduling</title>

    <!-- ===== CSS Section ===== -->
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f6fa;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 60%;
            margin: 40px auto;
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-weight: bold;
            margin: 12px 0 6px;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            font-size: 15px;
            border: 1px solid #aaa;
            border-radius: 6px;
            outline: none;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #0366ff;
        }

        .hidden {
            display: none;
        }

        .btn {
            width: 100%;
            background: #0366ff;
            padding: 12px;
            margin-top: 20px;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn:hover {
            background: #024ec9;
        }

        .success {
            margin-top: 20px;
            padding: 10px;
            background: #d1ffd6;
            border-left: 4px solid #24c030;
            display: none;
        }
    </style>

</head>
<body>

    <div class="container">
        <h2>Interview Scheduling</h2>

        <form id="interviewForm">
            
            <!-- Student Name -->
            <label>Select Student</label>
            <select id="student" required>
                <option value="">-- Choose Student --</option>
                <option value="Rohit Sharma">Rohit Sharma</option>
                <option value="Aditi Mehra">Aditi Mehra</option>
                <option value="Sameer Khan">Sameer Khan</option>
            </select>

            <!-- Interview Round -->
            <label>Interview Round</label>
            <select id="round" required>
                <option value="">-- Select Round --</option>
                <option value="Technical Round">Technical Round</option>
                <option value="HR Round">HR Round</option>
                <option value="Final Round">Final Round</option>
            </select>

            <!-- Date -->
            <label>Interview Date</label>
            <input type="date" id="date" required>

            <!-- Time -->
            <label>Interview Time</label>
            <input type="time" id="time" required>

            <!-- Mode -->
            <label>Interview Mode</label>
            <select id="mode" required>
                <option value="">-- Choose Mode --</option>
                <option value="Online">Online</option>
                <option value="Offline">Offline</option>
            </select>

            <!-- Meeting Link (Online) -->
            <div id="meetingDiv" class="hidden">
                <label>Meeting Link</label>
                <input type="text" id="meetingLink" placeholder="Enter Google Meet / Zoom link">
            </div>

            <!-- Location Field (Offline) -->
            <div id="locationDiv" class="hidden">
                <label>Interview Location</label>
                <input type="text" id="location" placeholder="Enter Interview Venue">
            </div>

            <!-- Button -->
            <button type="submit" class="btn">Schedule Interview</button>
        </form>

        <!-- Success Message -->
        <div id="successMsg" class="success">
            🎉 Interview Successfully Scheduled!
        </div>
    </div>

    <!-- ===== JavaScript Section ===== -->
    <script>
        const modeSelect = document.getElementById("mode");
        const meetingDiv = document.getElementById("meetingDiv");
        const locationDiv = document.getElementById("locationDiv");

        modeSelect.addEventListener("change", () => {
            const mode = modeSelect.value;

            if (mode === "Online") {
                meetingDiv.classList.remove("hidden");
                locationDiv.classList.add("hidden");
            } 
            else if (mode === "Offline") {
                locationDiv.classList.remove("hidden");
                meetingDiv.classList.add("hidden");
            }
        });

        // Form Submission
        document.getElementById("interviewForm").addEventListener("submit", function(e) {
            e.preventDefault();

            // show success message
            document.getElementById("successMsg").style.display = "block";

            // Reset form
            this.reset();
            meetingDiv.classList.add("hidden");
            locationDiv.classList.add("hidden");

            setTimeout(() => {
                document.getElementById("successMsg").style.display = "none";
            }, 3000);
        });
    </script>

</body>
</html>
