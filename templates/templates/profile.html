<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recruiter Profile - Campus Placement</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<style>
/* Reset */
* { margin:0; padding:0; box-sizing: border-box; }

body {
    font-family:'Roboto', sans-serif;
    background:#f5f7fa;
    color:#333;
}

header {
    background:#0f111a;
    color:#fff;
    padding:15px 30px;
    text-align:center;
    font-size:24px;
    font-weight:500;
}

.container {
    max-width:900px;
    margin:40px auto;
    background:#fff;
    padding:30px;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

.profile-header {
    display:flex;
    align-items:center;
    gap:20px;
    margin-bottom:30px;
}

.profile-header img {
    width:100px;
    height:100px;
    border-radius:50%;
    border:3px solid #007bff;
    object-fit:cover;
    cursor:pointer;
}

#changePhotoBtn, #removePhotoBtn {
    background:#6c757d;
    color:#fff;
    padding:8px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    display:none;
    margin-top:5px;
}

#removePhotoBtn {
    background:red;
}

.profile-field {
    display:flex;
    flex-direction:column;
    margin-bottom:20px;
}

.profile-field label {
    font-weight:500;
    margin-bottom:5px;
    color:#555;
}

.profile-field input {
    padding:12px;
    border-radius:8px;
    border:1px solid #ccc;
}

.profile-field input[readonly] {
    background:#f1f3f6;
}

.btn-group { display:flex; gap:15px; }

.btn {
    padding:12px 25px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:500;
    font-size:16px;
}

.btn-edit { background:#007bff; color:#fff; }
.btn-save { background:#28a745; color:#fff; }

.success-message {
    margin-top:15px;
    color:#28a745;
}

/* MODAL */
#photoModal {
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.75);
    display:none;
    justify-content:center;
    align-items:center;
}

#modalBox {
    background:#fff;
    padding:20px;
    width:450px;
    border-radius:12px;
    text-align:center;
}

#dropArea {
    width:100%;
    padding:25px;
    border:2px dashed #007bff;
    border-radius:10px;
    cursor:pointer;
}

#dropArea:hover { background:#eef5ff; }

canvas {
    margin-top:15px;
    border:1px solid #ccc;
}

.modal-btn {
    margin-top:10px;
    padding:10px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>
<body>

<header>Campus Placement Portal</header>

<div class="container">

    <div class="profile-header">
        <img id="profileImg" src="/media/profile_pics/default.png">

        <div>
            <h2 id="recruiterDisplayName">John Doe</h2>
            <button id="changePhotoBtn">Change Photo</button>
            <button id="removePhotoBtn">Remove Photo</button>
        </div>
    </div>

    <!-- PROFILE FIELDS -->
    <div class="profile-field">
        <label>Company Name</label>
        <input id="companyName" value="ABC Pvt Ltd" readonly>
    </div>

    <div class="profile-field">
        <label>Recruiter Name</label>
        <input id="recruiterName" value="John Doe" readonly>
    </div>

    <div class="profile-field">
        <label>Email</label>
        <input type="email" id="email" value="john.doe@abc.com" readonly>
    </div>

    <div class="profile-field">
        <label>Phone</label>
        <input id="phone" value="+91-9876543210" readonly>
    </div>

    <div class="btn-group">
        <button class="btn btn-edit" id="editBtn">Edit Profile</button>
        <button class="btn btn-save" id="saveBtn" style="display:none;">Save Profile</button>
    </div>

    <p class="success-message" id="message"></p>
</div>

<!-- PHOTO UPLOAD MODAL -->
<div id="photoModal">
    <div id="modalBox">
        <h3>Upload & Crop Photo</h3>

        <div id="dropArea">Drop Image Here or Click to Upload</div>
        <input type="file" id="fileInput" hidden accept="image/*">

        <canvas id="cropCanvas" width="300" height="300"></canvas>

        <button class="modal-btn" id="uploadBtn" style="background:#007bff;color:white;">Upload</button>
        <button class="modal-btn" id="closeModal" style="background:#555;color:white;">Cancel</button>
    </div>
</div>

<script>
// ======= CSRF HELPER =======
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let cookie of cookies) {
            cookie = cookie.trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}
const csrftoken = getCookie('csrftoken');

// ======= PROFILE EDIT =======
const editBtn = document.getElementById("editBtn");
const saveBtn = document.getElementById("saveBtn");
const message = document.getElementById("message");
const displayName = document.getElementById("recruiterDisplayName");
const fields = ["companyName", "recruiterName", "email", "phone"];
const photoBtn = document.getElementById("changePhotoBtn");
const removeBtn = document.getElementById("removePhotoBtn");
const profileImg = document.getElementById("profileImg");

editBtn.onclick = () => {
    fields.forEach(id => document.getElementById(id).removeAttribute("readonly"));
    photoBtn.style.display = "inline-block";
    removeBtn.style.display = "inline-block";
    editBtn.style.display = "none";
    saveBtn.style.display = "inline-block";
};

saveBtn.onclick = () => {
    fields.forEach(id => document.getElementById(id).setAttribute("readonly", true));
    photoBtn.style.display = "none";
    removeBtn.style.display = "none";
    editBtn.style.display = "inline-block";
    saveBtn.style.display = "none";
    displayName.textContent = document.getElementById("recruiterName").value;
    message.textContent = "Profile updated successfully!";
};

// ======= PHOTO UPLOAD & CROP =======
const modal = document.getElementById("photoModal");
const dropArea = document.getElementById("dropArea");
const cropCanvas = document.getElementById("cropCanvas");
const fileInput = document.getElementById("fileInput");
let ctx = cropCanvas.getContext("2d");
let img = new Image();

photoBtn.onclick = () => { modal.style.display = "flex"; };
document.getElementById("closeModal").onclick = () => { modal.style.display = "none"; };
dropArea.onclick = () => fileInput.click();

fileInput.onchange = e => loadImage(e.target.files[0]);
dropArea.ondragover = e => { e.preventDefault(); dropArea.style.background="#eef5ff"; };
dropArea.ondragleave = () => dropArea.style.background="white";
dropArea.ondrop = e => { e.preventDefault(); dropArea.style.background="white"; loadImage(e.dataTransfer.files[0]); };

function loadImage(file){
    if (!file) return;
    let reader = new FileReader();
    reader.onload = () => {
        img.src = reader.result;
        img.onload = () => {
            ctx.clearRect(0,0,300,300);
            ctx.drawImage(img, 0,0,300,300);
        };
    };
    reader.readAsDataURL(file);
}

// ======= UPLOAD PHOTO =======
document.getElementById("uploadBtn").onclick = () => {
    cropCanvas.toBlob(blob => {
        if(!blob) return;
        let formData = new FormData();
        formData.append("photo", blob, "profile.png");

        fetch("/upload-photo/", {
            method:"POST",
            headers: { "X-CSRFToken": csrftoken },
            body:formData
        })
        .then(res => res.json())
        .then(data => {
            if(data.image_url){
                profileImg.src = data.image_url;
                modal.style.display = "none";
            } else {
                alert("Upload failed!");
            }
        }).catch(err => alert("Upload error: " + err));
    });
};

// ======= REMOVE PHOTO =======
removeBtn.onclick = () => {
    fetch("/delete-photo/", {
        method:"POST",
        headers: { "X-CSRFToken": csrftoken }
    })
    .then(r => r.json())
    .then(data => { if(data.image_url) profileImg.src = data.image_url; })
    .catch(err => alert("Delete error: " + err));
};


</script>
</body>
</html>
