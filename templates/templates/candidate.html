<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recruiter Candidate Dashboard</title>
    <style>
        /* Reset & basic styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
        }
        header {
            background-color: #007bff;
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 {
            font-size: 24px;
        }
        .main-content {
            padding: 20px;
        }
        /* Candidate Form */
        .candidate-form {
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .candidate-form label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }
        .candidate-form input, .candidate-form textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 3px;
            border: 1px solid #ccc;
        }
        .candidate-form button {
            margin-top: 15px;
            padding: 10px 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        .candidate-form button:hover {
            background-color: #0056b3;
        }
        /* Candidate List */
        .candidate-list {
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .candidate-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .candidate-item:last-child {
            border-bottom: none;
        }
        .candidate-item button {
            margin-left: 10px;
            padding: 5px 10px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 14px;
        }
        .edit-btn {
            background-color: #28a745;
            color: white;
        }
        .edit-btn:hover {
            background-color: #218838;
        }
        .delete-btn {
            background-color: #dc3545;
            color: white;
        }
        .delete-btn:hover {
            background-color: #c82333;
        }
    </style>
</head>
<body>
    <header>
        <h1>Recruiter Candidate Dashboard</h1>
    </header>

    <div class="main-content">
        <!-- Candidate Form -->
        <div class="candidate-form">
            <h2 id="formTitle">Add New Candidate</h2>
            <label for="candidateName">Name</label>
            <input type="text" id="candidateName" placeholder="Enter Candidate Name">
            <label for="candidateEmail">Email</label>
            <input type="email" id="candidateEmail" placeholder="Enter Candidate Email">
            <label for="candidatePhone">Phone</label>
            <input type="text" id="candidatePhone" placeholder="Enter Candidate Phone">
            <label for="candidateSkills">Skills</label>
            <input type="text" id="candidateSkills" placeholder="Enter Candidate Skills (comma separated)">
            <label for="candidateExperience">Experience (in years)</label>
            <input type="number" id="candidateExperience" placeholder="Enter Experience">
            <button id="saveCandidateBtn">Save Candidate</button>
        </div>

        <!-- Candidate List -->
        <div class="candidate-list">
            <h2>Candidate Listings</h2>
            <div id="candidatesContainer">
                <!-- Candidate items will appear here -->
            </div>
        </div>
    </div>

    <script>
        // Initialize candidates array from localStorage or empty
        let candidates = JSON.parse(localStorage.getItem('candidatesData')) || [];
        let editIndex = -1;

        const candidateName = document.getElementById('candidateName');
        const candidateEmail = document.getElementById('candidateEmail');
        const candidatePhone = document.getElementById('candidatePhone');
        const candidateSkills = document.getElementById('candidateSkills');
        const candidateExperience = document.getElementById('candidateExperience');
        const saveCandidateBtn = document.getElementById('saveCandidateBtn');
        const candidatesContainer = document.getElementById('candidatesContainer');
        const formTitle = document.getElementById('formTitle');

        // Render candidates
        function renderCandidates() {
            candidatesContainer.innerHTML = '';
            if(candidates.length === 0) {
                candidatesContainer.innerHTML = '<p>No candidates available.</p>';
                return;
            }
            candidates.forEach((candidate, index) => {
                const candidateDiv = document.createElement('div');
                candidateDiv.className = 'candidate-item';
                candidateDiv.innerHTML = `
                    <div>
                        <strong>${candidate.name}</strong> - ${candidate.experience} yrs<br>
                        Email: ${candidate.email}, Phone: ${candidate.phone}<br>
                        Skills: ${candidate.skills}
                    </div>
                    <div>
                        <button class="edit-btn" onclick="editCandidate(${index})">Edit</button>
                        <button class="delete-btn" onclick="deleteCandidate(${index})">Delete</button>
                    </div>
                `;
                candidatesContainer.appendChild(candidateDiv);
            });
        }

        // Save Candidate
        saveCandidateBtn.addEventListener('click', () => {
            const candidate = {
                name: candidateName.value,
                email: candidateEmail.value,
                phone: candidatePhone.value,
                skills: candidateSkills.value,
                experience: candidateExperience.value
            };

            if(!candidate.name || !candidate.email || !candidate.phone || !candidate.skills || !candidate.experience) {
                alert('Please fill all fields');
                return;
            }

            if(editIndex >= 0) {
                candidates[editIndex] = candidate;
                editIndex = -1;
                formTitle.textContent = 'Add New Candidate';
                saveCandidateBtn.textContent = 'Save Candidate';
            } else {
                candidates.push(candidate);
            }

            localStorage.setItem('candidatesData', JSON.stringify(candidates));
            renderCandidates();

            // Clear form
            candidateName.value = '';
            candidateEmail.value = '';
            candidatePhone.value = '';
            candidateSkills.value = '';
            candidateExperience.value = '';
        });

        // Edit Candidate
        function editCandidate(index) {
            const candidate = candidates[index];
            candidateName.value = candidate.name;
            candidateEmail.value = candidate.email;
            candidatePhone.value = candidate.phone;
            candidateSkills.value = candidate.skills;
            candidateExperience.value = candidate.experience;
            editIndex = index;
            formTitle.textContent = 'Edit Candidate';
            saveCandidateBtn.textContent = 'Update Candidate';
        }

        // Delete Candidate
        function deleteCandidate(index) {
            if(confirm('Are you sure you want to delete this candidate?')) {
                candidates.splice(index, 1);
                localStorage.setItem('candidatesData', JSON.stringify(candidates));
                renderCandidates();
            }
        }

        // Initial render
        renderCandidates();
    </script>
</body>
</html>
